allowBuilds:
  '@prisma/client': true
  '@tailwindcss/oxide': true
  better-sqlite3: true
  esbuild: true

# Force a single better-call version. @better-auth/cli (dev-only, still on the
# 1.4.x stack) drags in better-call 1.1.8, which pnpm would otherwise pick as the
# peer for the shared @better-auth/core@1.6.11 instance — but core 1.6.11 needs
# 1.3.5 (it imports kAPIErrorHeaderSymbol, added in 1.3.5). Pin to one version.
overrides:
  better-call: 1.3.5
