# git-cliff configuration ~ https://git-cliff.org/docs/configuration

[changelog]
# template for the changelog header
header = """
# Changelog\n
All notable changes to this project are documented here.\n
"""
# template for each release, rendered with Tera (https://keats.github.io/tera/)
body = """
{% if version %}\
    <a name="{{ version }}"></a>
    ## {% if previous.version %}\
        [{{ version }}](https://github.com/p-arndt/uprox/compare/{{ previous.version }}...{{ version }})\
    {% else %}\
        {{ version }}\
    {% endif %}

    > {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## Unreleased
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}

    {% for commit in commits %}\
        * {{ commit.message | upper_first }}
    {% endfor %}\
{% endfor %}\n
"""
# template for the changelog footer
footer = ""
# remove leading and trailing whitespace from the templates
trim = true

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true
# filter out the commits that are not conventional
filter_unconventional = true
# process each line of a commit as an individual commit
split_commits = false
# regex for preprocessing the commit messages
commit_preprocessors = []
# regex for parsing and grouping commits.
# The `<!-- N -->` prefixes only control ordering and are stripped from the output.
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->💫 Features" },
  { message = "^fix", group = "<!-- 1 -->🐛 Fixes" },
  { message = "^refactor", group = "<!-- 2 -->🔧 Refactors" },
  { message = "^test", group = "<!-- 3 -->🧪 Tests" },
  { message = "^docs", group = "<!-- 4 -->📝 Docs" },
  { message = "^chore", group = "<!-- 5 -->Other" },
  { message = ".*", skip = true },
]
# protect breaking changes from being skipped due to matching a skip parser
protect_breaking_commits = false
# filter out the commits that are not matched by commit parsers
filter_commits = true
# sort the tags topologically
topo_order = false
# sort the commits inside sections by oldest/newest order
sort_commits = "oldest"
